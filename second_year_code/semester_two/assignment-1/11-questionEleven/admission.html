<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>BlueWave College - Admission</title><link rel="stylesheet" href="style.css" /></head>
<body>
<header>
  <div class="brand"><div class="logo">BC</div><h1>BlueWave College</h1></div>
  <nav><a href="home.html">Home</a><a href="academics.html">Academics</a><a href="admission.html">Admission</a><a href="gallery.html">Gallery</a></nav>
</header>
<main>
  <section>
    <h2>Admission Form</h2>
    <form>
      <label>Full Name<input type="text" name="name" required /></label>
      <label>Email<input type="email" name="email" required /></label>
      <label>Phone<input type="tel" name="phone" required /></label>
      <label>Date of Birth<input type="date" name="dob" required /></label>
      <label>Department
        <select name="department" required>
          <option value="">Select</option>
          <option>Arts</option><option>Science</option><option>Commerce</option>
        </select>
      </label>
      <label>Course Interested In<input type="text" name="course" required /></label>
      <label>Address<textarea name="address" rows="4" required></textarea></label>
      <button type="submit">Submit Application</button>
    </form>
  </section>
</main>
</body>
</html>
